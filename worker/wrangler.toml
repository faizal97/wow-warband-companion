name = "wow-companion-auth"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Set these as secrets via: wrangler secret put BNET_CLIENT_ID
# and: wrangler secret put BNET_CLIENT_SECRET

[[kv_namespaces]]
binding = "CACHE"
id = "PLACEHOLDER_KV_NAMESPACE_ID"        # Replace after: wrangler kv namespace create CACHE
preview_id = "PLACEHOLDER_KV_PREVIEW_ID"   # Replace after: wrangler kv namespace create CACHE --preview
