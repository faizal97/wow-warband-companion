name: wow_warband_companion
description: WoW Warband Companion - View your World of Warcraft characters, gear, Mythic+ scores, and raid progression
publish_to: 'none'
version: 0.3.1+5

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  http: ^1.2.0
  url_launcher: ^6.2.2
  provider: ^6.1.1
  shimmer: ^3.0.0
  flutter_cache_manager: ^3.4.1
  shared_preferences: ^2.5.4
  app_links: ^7.0.0
  package_info_plus: ^9.0.0
  path_provider: ^2.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#0D0D14"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
